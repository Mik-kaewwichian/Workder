services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: workder
      POSTGRES_PASSWORD: workder
      POSTGRES_DB: workder
    ports:
      - "5432:5432"
    volumes:
      - workder_db:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  workder_db:
